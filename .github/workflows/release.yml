name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  # Ensure release and uploads target this repo (avoids 404 when workflow runs in fork/cross-repo)
  RELEASE_REPO: ${{ github.repository }}
  # Use short tag name (e.g. v0.5.38); ref_name is correct for tag push, but strip refs/tags/ if ever passed
  RELEASE_TAG: ${{ github.ref_name }}

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Create (or update) release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          repository: ${{ env.RELEASE_REPO }}
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-upload:
    name: Build (${{ matrix.os }}) and upload assets
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            exe_ext: ''
          - os: macos-latest
            target: macos
            exe_ext: ''
            arch: arm64
          - os: macos-latest
            target: macos-intel
            exe_ext: ''
            arch: x86_64
          - os: windows-latest
            target: windows
            exe_ext: '.exe'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross-compilation target (Intel Mac)
        if: matrix.target == 'macos-intel'
        shell: bash
        run: rustup target add x86_64-apple-darwin

      - name: Build release
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == "macos-intel" ]]; then
            cargo build --release --target x86_64-apple-darwin
          else
            cargo build --release
          fi

      - name: Prepare assets
        shell: bash
        run: |
          mkdir -p release
          if [[ "${{ matrix.target }}" == "macos-intel" ]]; then
            SRC_MAIN="target/x86_64-apple-darwin/release/port-kill${{ matrix.exe_ext }}"
            SRC_CONSOLE="target/x86_64-apple-darwin/release/port-kill-console${{ matrix.exe_ext }}"
          else
            SRC_MAIN="target/release/port-kill${{ matrix.exe_ext }}"
            SRC_CONSOLE="target/release/port-kill-console${{ matrix.exe_ext }}"
          fi
          DEST_MAIN="release/port-kill-${{ matrix.target }}${{ matrix.exe_ext }}"
          DEST_CONSOLE="release/port-kill-console-${{ matrix.target }}${{ matrix.exe_ext }}"
          cp "$SRC_MAIN" "$DEST_MAIN"
          cp "$SRC_CONSOLE" "$DEST_CONSOLE"
          echo "ASSET_MAIN=$DEST_MAIN" >> $GITHUB_ENV
          echo "ASSET_CONSOLE=$DEST_CONSOLE" >> $GITHUB_ENV

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          repository: ${{ env.RELEASE_REPO }}
          draft: false
          files: |
            ${{ env.ASSET_MAIN }}
            ${{ env.ASSET_CONSOLE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
